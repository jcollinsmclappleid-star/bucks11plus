          "name": "How is the Bucks 11 Plus scored?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The test produces a raw score (total correct answers across both papers). GL Assessment then applies age standardisation, converting the raw score to a standardised score that accounts for the child's exact age on test day. A standardised score of 100 represents exactly average for age. The qualifying threshold is 121, which is approximately the top 15–20% of the cohort."
          }
        },
